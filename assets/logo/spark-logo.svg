<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spark AI Dating Coach logo">
  <defs>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8F5BFF" />
      <stop offset="55%" stop-color="#A74EFF" />
      <stop offset="100%" stop-color="#DD3EFF" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="200" fill="transparent" />

  <g transform="translate(250,40)">
    <path d="M0,-18 C-9,-18 -22,-8 -20,4 C-20,14 -8,20 0,28 C8,20 20,14 20,4 C18,-8 9,-18 0,-18 Z" fill="url(#sparkGradient)" filter="url(#softGlow)" opacity="0.95"/>
    <path d="M0,-18 C6,-12 12,-5 10,4 C9,11 5,17 0,22 C-5,17 -9,11 -10,4 C-12,-5 -6,-12 0,-18 Z" fill="white" opacity="0.22"/>
  </g>

  <text x="250" y="110" text-anchor="middle" fill="url(#sparkGradient)" font-family="Canela, Georgia, 'Times New Roman', serif" font-size="62" letter-spacing="0.5" font-weight="600" style="font-feature-settings:'liga' 1;">
    Spark
  </text>

  <text x="250" y="150" text-anchor="middle" fill="#CBD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">
    AI Dating Coach
  </text>
</svg>